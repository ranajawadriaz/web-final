<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="./assets/logo.png" alt="logo" width="35" height="35">
                UMT
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="admission.html">Admissions</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
            



        </div>



    </nav>

    <div class="page-header">
        <h1>Admission</h1>
        <p>Check your eligibility for admission</p>
    </div>

    <div class="container" style="margin-top: 30px;margin-bottom: 40px;">
        <div class="row">
            <div class="col-md-6" style="margin: 0 auto; float: none;">
                <div class="card">
                    <div class="card-header bg-dark" style="color: white; text-align: center;">
                        <h3>Eligibility Checker</h3>

                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Student Name:</label>
                            <input type="text" id="stName" placeholder="Enter your name" class="form-control">

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marks in Subject 1 (out of 100):</label>
                            <input type="number" class="form-control" placeholder="Enter marks" id="stMarks1">

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marks in Subject 2 (out of 100):</label>
                            <input type="number" class="form-control" placeholder="Enter marks" id="stMarks2">

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marks in Subject 3 (out of 100):</label>
                            <input type="number" placeholder="Enter marks" id="stMarks3" class="form-control">

                        </div>
                        <button onclick="checkEligibility()" class="btn btn-primary" style="width: 100%;">
                            Submit

                        </button>
                        <div id="eligibilityResult" style="display: none; margin-top: 20px;">

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark" style="color: white;padding: 20px;text-align: center;">
        <p>© 2026 UMT</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
    
</body>
</html>
