<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <img src="./assets/logo.png" alt="logo" width="35" height="35">
                UMT
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="admission.html">Admissions</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
            



        </div>



    </nav>

    <div class="page-header">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you</p>
    </div>

    <div class="container" style="margin-top: 30px;margin-bottom: 40px;">
        <div class="row">
            <div class="col-md-6" style="margin: 0 auto; float: none;">
                <div class="card">
                    <div class="card-header bg-dark" style="color: white;text-align: center;">
                        <h3>Send us a Message</h3>

                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Your Name:</label>
                            <input type="text" placeholder="Enter your name" id="cName" class="form-control">
                            <small id="nameError" style="color: red;display: none;">Please Enter your name</small>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number:</label>
                            <input type="text" id="cNum" placeholder="Enter phone number" class="form-control">
                            <small id="phoneError" style="color: red;display: none;">Please Enter Phone Number</small>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address:</label>
                            <input type="email" id="cEmail" placeholder="Enter your email" class="form-control">
                            <small id="emailError" style="color: red;display: none;">Please Enter a valid Email</small>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Your Message:</label>
                            <textarea id="txtarea" placeholder="Write your message" rows="4" class="form-control"></textarea>
                            <small id="txtError" style="color: red;display: none;">Please Enter message</small>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Solve this to verify:</label>
                            <p id="captchaQuestion" style="background-color: yellow;font-weight: bold;padding: 10px;"></p>
                            <input type="number" id="captchaAnswer" placeholder="Your answer" class="form-control">
                            <small id="captchaError" style="color: red;display: none;">Captcha Incorrect</small>
                            

                        </div>
                        <button onclick="contactSubmit()" class="btn btn-primary" style="width: 100%;">Contact Us</button>
                        

                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark" style="color: white;text-align: center;padding: 20px;">
        <p>© 2026 UMT</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

    <script>
        loadCaptcha();
    </script>
    
</body>
</html>
